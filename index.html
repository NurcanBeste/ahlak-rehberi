<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#556b2f" />
  <title>Boykot Rehberi</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="hero">
      <div class="topbar">
        <div class="brandMark">BR</div>
        <div>
          <h1 data-i18n="appTitle">Boykot Rehberi</h1>
          <p data-i18n="appSubtitle">Marka, ana firma ve alternatifleri hızlıca ara.</p>
        </div>
        <button id="themeBtn" class="iconBtn" title="Tema">🌙</button>
      </div>
      <div class="langBox" role="group" aria-label="Language">
        <button data-lang="tr" class="lang active">🇹🇷 TR</button>
        <button data-lang="en" class="lang">🇬🇧 EN</button>
        <button data-lang="de" class="lang">🇩🇪 DE</button>
      </div>
      <label class="searchWrap">
        <span>🔎</span>
        <input id="search" type="search" autocomplete="off" data-i18n-placeholder="searchPlaceholder" placeholder="Marka, ana firma, kategori veya alternatif ara..." />
        <button id="clearBtn" type="button">×</button>
      </label>
    </header>

    <main>
      <section id="stats" class="stats"></section>
      <section id="chips" class="chips"></section>
      <section id="results" class="results"></section>
    </main>

    <nav class="bottomNav" aria-label="Main navigation">
      <button data-view="home" class="active"><span>🏠</span><b data-i18n="navHome">Ana Sayfa</b></button>
      <button data-view="companies"><span>🏢</span><b data-i18n="navCompanies">Ana Firmalar</b></button>
      <button data-view="categories"><span>📂</span><b data-i18n="navCategories">Kategoriler</b></button>
      <button data-view="safe"><span>✅</span><b data-i18n="navSafe">Boykotta Değil</b></button>
      <button data-view="about"><span>ℹ️</span><b data-i18n="navAbout">Hakkında</b></button>
    </nav>
  </div>

  <dialog id="detailDialog" class="detailDialog">
    <div id="detailContent"></div>
    <button id="closeDialog" class="closeDialog" data-i18n="close">Kapat</button>
  </dialog>

  <script src="app.js"></script>
</body>
</html>

<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#5f6f3a" />
  <title>Boykot Rehberi V3</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app" class="app-shell">
    <header class="hero">
      <div class="topbar">
        <div class="brandmark">BR</div>
        <div>
          <h1 data-i18n="appTitle">Boykot Rehberi</h1>
          <p data-i18n="tagline">Marka, ana firma ve alternatif arama</p>
        </div>
        <button id="themeBtn" class="icon-btn" type="button" aria-label="Tema">🌙</button>
      </div>

      <div class="lang-row" aria-label="Dil seçimi">
        <button data-lang="tr" class="lang active" type="button">🇹🇷 TR</button>
        <button data-lang="en" class="lang" type="button">🇬🇧 EN</button>
        <button data-lang="de" class="lang" type="button">🇩🇪 DE</button>
      </div>

      <label class="searchbox">
        <span>🔍</span>
        <input id="search" type="search" autocomplete="off" data-i18n-placeholder="searchPlaceholder" placeholder="Marka ara..." />
        <button id="clearBtn" type="button" aria-label="Temizle">×</button>
      </label>
    </header>

    <main>
      <section id="stats" class="stats"></section>
      <section id="chips" class="chips"></section>
      <section id="results" class="results" aria-live="polite"></section>
    </main>

    <nav class="bottom-nav" aria-label="Alt menü">
      <button data-view="home" class="nav-active" type="button"><span>🏠</span><b data-i18n="home">Ana Sayfa</b></button>
      <button data-view="companies" type="button"><span>🏢</span><b data-i18n="companies">Ana Firmalar</b></button>
      <button data-view="categories" type="button"><span>📂</span><b data-i18n="categories">Kategoriler</b></button>
      <button data-view="notBoycotted" type="button"><span>✅</span><b data-i18n="notBoycotted">Boykotta Değil</b></button>
      <button data-view="about" type="button"><span>ℹ️</span><b data-i18n="about">Hakkında</b></button>
    </nav>
  </div>

  <dialog id="detailDialog" class="detail-dialog">
    <div id="detailContent"></div>
    <button id="closeDialog" class="close-dialog" type="button" data-i18n="close">Kapat</button>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
